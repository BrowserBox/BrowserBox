name: bbx Saga Test Suite (Public Release)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to test (e.g., v15.10.2)"
        required: true
        type: string
      disable_tmate:
        description: "Disable tmate debug sessions on failure"
        required: false
        default: false
        type: boolean
      matrix_json:
        description: "JSON matrix (keys: os, container_image, exclude). Leave empty for default."
        required: false
        default: ""
        type: string

concurrency:
  group: ${{ github.repository }}-bbx-saga
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

env:
  RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.release_tag || '' }}
  DISABLE_TMATE: ${{ github.event.inputs.disable_tmate || 'false' }}
  TARGET_RELEASE_REPO: BrowserBox/BrowserBox
  WORKFLOW_GH_TOKEN: ${{ secrets.DISPATCH_TOKEN != '' && secrets.DISPATCH_TOKEN || github.token }}

jobs:
  saga:
    name: build (${{ matrix.os }}${{ matrix.container_image != '' && format(', {0}', matrix.container_image) || '' }})
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(github.event_name == 'workflow_dispatch' && github.event.inputs.matrix_json != '' && github.event.inputs.matrix_json || '{"os":["ubuntu-latest","macos-latest","windows-latest"],"container_image":["","dokken/centos-stream-10","rockylinux:9","debian:latest"],"exclude":[{"os":"macos-latest","container_image":"dokken/centos-stream-10"},{"os":"macos-latest","container_image":"rockylinux:9"},{"os":"macos-latest","container_image":"debian:latest"},{"os":"windows-latest","container_image":"dokken/centos-stream-10"},{"os":"windows-latest","container_image":"rockylinux:9"},{"os":"windows-latest","container_image":"debian:latest"}]}' ) }}
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container_image }}
    timeout-minutes: 19
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate release tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${RELEASE_TAG}" ]]; then
            echo "RELEASE_TAG is required (release event or workflow_dispatch input release_tag)." >&2
            exit 1
          fi
          echo "Testing release: ${TARGET_RELEASE_REPO}@${RELEASE_TAG}"

      - name: Prepare clean test workspace (Unix/macOS)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          set -euo pipefail
          cp .github/scripts/test-bbx.sh "$HOME/test-bbx.sh"
          cp .github/scripts/bbx-ci-e2e.mjs "$HOME/bbx-ci-e2e.mjs"
          chmod +x "$HOME/test-bbx.sh"
          chmod +x "$HOME/bbx-ci-e2e.mjs"
          echo "BBX_TEST_DIR=$HOME" >> "$GITHUB_ENV"
          rm -rf "$GITHUB_WORKSPACE"
          mkdir -p "$GITHUB_WORKSPACE"

      - name: Install BrowserBox (Unix/macOS)
        if: matrix.os != 'windows-latest'
        shell: bash
        env:
          BBX_INSTALL_USER: "bbxuser"
          BBX_TEST_AGREEMENT: "true"
          BBX_HOSTNAME: "localhost"
          BB_QUICK_EXIT: "yesplease"
          EMAIL: "test@example.com"
          LICENSE_KEY: ${{ secrets.BB_LICENSE_KEY }}
          STATUS_MODE: ${{ secrets.STATUS_MODE_KEY }}
          INSTALL_DOC_VIEWER: "false"
          GH_TOKEN: ${{ env.WORKFLOW_GH_TOKEN }}
          BBX_DEBUG_OS_LABEL: ${{ matrix.container_image != '' && matrix.container_image || matrix.os }}
          BBX_RELEASE_REPO: ${{ env.TARGET_RELEASE_REPO }}
          BBX_RELEASE_TAG: ${{ env.RELEASE_TAG }}
          BBX_NO_UPDATE: "true"
        working-directory: ${{ env.BBX_TEST_DIR }}
        run: |
          set -euo pipefail
          if ! command -v curl >/dev/null 2>&1 || ! command -v jq >/dev/null 2>&1 || ! command -v xxd >/dev/null 2>&1 || ! command -v sudo >/dev/null 2>&1 || ! command -v ps >/dev/null 2>&1 || ! command -v pkill >/dev/null 2>&1; then
            if command -v apt-get >/dev/null 2>&1; then
              apt-get update -y
              apt-get install -y curl jq xxd sudo procps
            elif command -v dnf >/dev/null 2>&1; then
              packages=()
              append_pkg_if_missing() {
                local cmd="$1"
                local pkg="$2"
                if ! command -v "$cmd" >/dev/null 2>&1; then
                  packages+=("$pkg")
                fi
              }
              append_pkg_if_missing curl curl-minimal
              append_pkg_if_missing jq jq
              append_pkg_if_missing xxd vim-common
              append_pkg_if_missing sudo sudo
              append_pkg_if_missing ps procps-ng
              append_pkg_if_missing pkill procps-ng
              if ((${#packages[@]})); then
                dnf install -y "${packages[@]}"
              fi
            elif command -v yum >/dev/null 2>&1; then
              yum install -y curl jq vim-common sudo procps-ng
            elif command -v apk >/dev/null 2>&1; then
              apk add --no-cache curl jq xxd sudo procps
            else
              echo "curl, jq, xxd, sudo, ps, and pkill are required but no supported package manager found." >&2
              exit 1
            fi
          fi
          if command -v sudo >/dev/null 2>&1; then
            if [[ -w /etc/sudoers.d ]] && grep -qE '^[[:space:]]*#includedir[[:space:]]+/etc/sudoers.d' /etc/sudoers; then
              echo "bbxuser ALL=(ALL) NOPASSWD:ALL" >/etc/sudoers.d/bbxuser
              chmod 0440 /etc/sudoers.d/bbxuser
            elif [[ -w /etc/sudoers ]]; then
              if ! grep -qE '^bbxuser[[:space:]]+ALL=\(ALL\)[[:space:]]+NOPASSWD:ALL' /etc/sudoers; then
                echo "bbxuser ALL=(ALL) NOPASSWD:ALL" >>/etc/sudoers
              fi
            fi
          fi
          install_url="https://raw.githubusercontent.com/BrowserBox/BrowserBox/${RELEASE_TAG}/deploy-scripts/install.sh"
          echo "Using installer: ${install_url}"
          if [[ "${BBX_RELEASE_TAG}" == *-draft* ]]; then
            echo "Draft release API diagnostics..."
            echo "GH_TOKEN_LENGTH=${#GH_TOKEN}"
            tag_status=$(curl -sS -o /tmp/bbx-release-tag.json -w "%{http_code}" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              "https://api.github.com/repos/${BBX_RELEASE_REPO}/releases/tags/${BBX_RELEASE_TAG}" || true)
            list_status=$(curl -sS -o /tmp/bbx-release-list.json -w "%{http_code}" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              "https://api.github.com/repos/${BBX_RELEASE_REPO}/releases?per_page=100" || true)
            echo "tag_endpoint_status=${tag_status}"
            echo "list_endpoint_status=${list_status}"
            if command -v jq >/dev/null 2>&1; then
              echo "tag_endpoint_body:"
              jq '.' /tmp/bbx-release-tag.json || true
              echo "list_match_summary:"
              jq --arg tag "${BBX_RELEASE_TAG}" \
                'map(select(.tag_name == $tag))[0] | {tag_name, draft, assets: [.assets[].name]}' \
                /tmp/bbx-release-list.json || true
            fi
          fi
          curl -fsSL "$install_url" | bash

      - name: Verify bbx install (Unix/macOS)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          set -euo pipefail
          echo "PATH=$PATH"
          echo "bbx command: $(command -v bbx || echo 'not found')"
          echo "browserbox command: $(command -v browserbox || echo 'not found')"
          ls -la /usr/local/bin/bbx 2>/dev/null || true
          ls -la /usr/local/bin/browserbox 2>/dev/null || true
          ls -la /usr/bin/bbx 2>/dev/null || true
          ls -la /usr/bin/browserbox 2>/dev/null || true

      - name: Execute BBX Test Saga (Unix/macOS)
        if: matrix.os != 'windows-latest'
        shell: bash
        env:
          BBX_INSTALL_USER: "bbxuser"
          BBX_HOSTNAME: "localhost"
          BBX_NO_UPDATE: "true"
          BB_QUICK_EXIT: "yesplease"
          EMAIL: "test@example.com"
          LICENSE_KEY: ${{ secrets.BB_LICENSE_KEY }}
          BBX_TEST_AGREEMENT: "true"
          STATUS_MODE: ${{ secrets.STATUS_MODE_KEY }}
          INSTALL_DOC_VIEWER: "false"
          GH_TOKEN: ${{ env.WORKFLOW_GH_TOKEN }}
          BBX_RELEASE_REPO: ${{ env.TARGET_RELEASE_REPO }}
          BBX_RELEASE_TAG: ${{ env.RELEASE_TAG }}
          BBX_CI_CONTAINER_IMAGE: ${{ matrix.container_image }}
        working-directory: ${{ env.BBX_TEST_DIR }}
        run: |
          set -euo pipefail
          ./test-bbx.sh

      - name: Install BrowserBox (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          BBX_FORCE_CHROME_INSTALL: "false"
          GH_TOKEN: ${{ env.WORKFLOW_GH_TOKEN }}
        run: |
          $ErrorActionPreference = 'Stop'
          Write-Host "Installing BrowserBox..."
          & pwsh -NoProfile -ExecutionPolicy Bypass -Command "irm browserbox.io/install.ps1 | iex"
          if ($LASTEXITCODE -ne 0) { Write-Error "Install failed with exit code $LASTEXITCODE"; exit 1 }
          $bbxBinDir = "$env:LOCALAPPDATA\browserbox\bin"
          if (Test-Path $bbxBinDir) {
            $env:PATH = "$bbxBinDir;$env:PATH"
            "$bbxBinDir" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
            Write-Host "Added $bbxBinDir to PATH"
          }
          $bbxCmd = Get-Command bbx -ErrorAction SilentlyContinue
          if (-not $bbxCmd) {
            Write-Error "bbx not found in PATH after install"
            exit 1
          }
          Write-Host "bbx installed at $($bbxCmd.Source)"
          $wrapperDir = Split-Path -Parent $bbxCmd.Source
          $repoWindowsScripts = Join-Path $env:GITHUB_WORKSPACE "windows-scripts"
          $wrapperFiles = @(
            "bbx.ps1",
            "start.ps1",
            "stop.ps1",
            "setup.ps1",
            "certify.ps1",
            "prepare.ps1",
            "uninstall.ps1",
            "cp_commands_only.ps1"
          )
          foreach ($file in $wrapperFiles) {
            $sourcePath = Join-Path $repoWindowsScripts $file
            if (Test-Path $sourcePath) {
              Copy-Item -Path $sourcePath -Destination (Join-Path $wrapperDir $file) -Force
            }
          }
          Write-Host "Overrode Windows wrapper scripts in $wrapperDir from repo source"
          if (-not (Get-Command npm -ErrorAction SilentlyContinue)) {
            Write-Error "npm not found in PATH"
            exit 1
          }
          $wrtcTempDir = Join-Path ([System.IO.Path]::GetTempPath()) ("bbx-wrtc-" + [System.Guid]::NewGuid().ToString("N"))
          New-Item -ItemType Directory -Path $wrtcTempDir -Force | Out-Null
          Push-Location $wrtcTempDir
          npm pack @roamhq/wrtc-win32-x64@0.10.0 --silent
          if ($LASTEXITCODE -ne 0) {
            Pop-Location
            Remove-Item -Path $wrtcTempDir -Recurse -Force -ErrorAction SilentlyContinue
            Write-Error "Failed to fetch @roamhq/wrtc-win32-x64 tarball for CI seeding"
            exit 1
          }
          $wrtcTarball = Join-Path $wrtcTempDir "roamhq-wrtc-win32-x64-0.10.0.tgz"
          if (-not (Test-Path $wrtcTarball)) {
            Pop-Location
            Remove-Item -Path $wrtcTempDir -Recurse -Force -ErrorAction SilentlyContinue
            Write-Error "Fetched @roamhq/wrtc-win32-x64 but tarball was not found at $wrtcTarball"
            exit 1
          }
          tar -xf $wrtcTarball
          if ($LASTEXITCODE -ne 0) {
            Pop-Location
            Remove-Item -Path $wrtcTempDir -Recurse -Force -ErrorAction SilentlyContinue
            Write-Error "Failed to extract @roamhq/wrtc-win32-x64 tarball"
            exit 1
          }
          $wrtcNodeSource = Join-Path $wrtcTempDir "package\wrtc.node"
          if (-not (Test-Path $wrtcNodeSource)) {
            Pop-Location
            Remove-Item -Path $wrtcTempDir -Recurse -Force -ErrorAction SilentlyContinue
            Write-Error "Extracted @roamhq/wrtc-win32-x64 but wrtc.node was not found at $wrtcNodeSource"
            exit 1
          }
          $wrtcWorkspaceModuleDir = Join-Path $env:GITHUB_WORKSPACE "node_modules\@roamhq\wrtc-win32-x64"
          New-Item -ItemType Directory -Path $wrtcWorkspaceModuleDir -Force | Out-Null
          Copy-Item -Path $wrtcNodeSource -Destination (Join-Path $wrtcWorkspaceModuleDir "wrtc.node") -Force
          $wrtcWorkspaceReleaseDir = Join-Path $env:GITHUB_WORKSPACE "build\Release"
          New-Item -ItemType Directory -Path $wrtcWorkspaceReleaseDir -Force | Out-Null
          Copy-Item -Path $wrtcNodeSource -Destination (Join-Path $wrtcWorkspaceReleaseDir "wrtc.node") -Force
          $wrtcReleaseDir = Join-Path $env:USERPROFILE "build\Release"
          New-Item -ItemType Directory -Path $wrtcReleaseDir -Force | Out-Null
          Copy-Item -Path $wrtcNodeSource -Destination (Join-Path $wrtcReleaseDir "wrtc.node") -Force
          Pop-Location
          Remove-Item -Path $wrtcTempDir -Recurse -Force -ErrorAction SilentlyContinue
          Write-Host "Seeded wrtc.node for Windows CI at $wrtcWorkspaceModuleDir, $wrtcWorkspaceReleaseDir, and $wrtcReleaseDir"
          if (-not (Get-Command curl.exe -ErrorAction SilentlyContinue)) {
            winget install cURL.cURL --silent --accept-source-agreements --accept-package-agreements
          }
          if (-not (Get-Command curl.exe -ErrorAction SilentlyContinue)) {
            Write-Error "curl.exe not installed"
            exit 1
          }
          Write-Host "curl.exe available"

      - name: Execute BBX Test Saga (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          GH_TOKEN: ${{ env.WORKFLOW_GH_TOKEN }}
          BBX_NO_UPDATE: "true"
          BBX_FORCE_CHROME_INSTALL: "false"
          BBX_HOSTNAME: "localhost"
          EMAIL: "test@example.com"
          BB_QUICK_EXIT: "surewhatevs"
          LICENSE_KEY: ${{ secrets.BB_LICENSE_KEY }}
          BBX_TEST_AGREEMENT: "true"
          STATUS_MODE: ${{ secrets.STATUS_MODE_KEY }}
          BBX_DONT_KILL_CHROME_ON_STOP: "false"
        run: |
          $ErrorActionPreference = 'Stop'
          $wrtcSeedSource = Join-Path $env:USERPROFILE "build\Release\wrtc.node"
          if (-not (Test-Path $wrtcSeedSource)) {
            throw "Expected seeded wrtc.node at $wrtcSeedSource before Windows saga step"
          }
          $wrtcWatcher = Start-Job -Name "bbx-wrtc-temp-seeder" -ArgumentList $wrtcSeedSource -ScriptBlock {
            param($SeedSource)
            $deadline = (Get-Date).AddMinutes(8)
            while ((Get-Date) -lt $deadline) {
              Get-ChildItem -Path ([System.IO.Path]::GetTempPath()) -Directory -Filter 'sea-wrtc-*' -ErrorAction SilentlyContinue | ForEach-Object {
                $nativeDir = Join-Path $_.FullName "node_modules\@roamhq\wrtc-win32-x64"
                $nativePath = Join-Path $nativeDir "wrtc.node"
                if (-not (Test-Path $nativePath)) {
                  New-Item -ItemType Directory -Path $nativeDir -Force | Out-Null
                  Copy-Item -Path $SeedSource -Destination $nativePath -Force
                }
              }
              Start-Sleep -Milliseconds 250
            }
          }
          Write-Host "Started wrtc temp seeder job $($wrtcWatcher.Id) using $wrtcSeedSource"
          try {
            @('BBX_HOSTNAME','EMAIL','LICENSE_KEY','BBX_TEST_AGREEMENT','STATUS_MODE') | ForEach-Object {
              $val = [Environment]::GetEnvironmentVariable($_)
              Write-Host "$_ is $(if ($val) { 'set' } else { 'not set' })"
            }
            $setupOut = bbx setup -Hostname "$env:BBX_HOSTNAME" -Email "$env:EMAIL" -Port 9999 2>&1 | Tee-Object -Variable setupLog
            $loginLink = $null
            $linkFile = "$env:USERPROFILE\.config\dosaygo\bbpro\login.link"
            if (Test-Path $linkFile) {
              $loginLink = (Get-Content $linkFile -ErrorAction SilentlyContinue | Select-String 'https?://').ToString().Trim()
            }
            if (-not $loginLink) {
              $logText = ($setupLog | Out-String)
              $match = [regex]::Match($logText, 'https?://\S+/login\?token=\S+')
              if ($match.Success) { $loginLink = $match.Value.Trim() }
            }
            if (-not $loginLink) {
              $testEnv = "$env:USERPROFILE\.config\dosaygo\bbpro\test.env"
              if (Test-Path $testEnv) {
                $token = Select-String -Path $testEnv -Pattern 'LOGIN_TOKEN=(.+)' | ForEach-Object { $_.Matches.Groups[1].Value }
                if ($token) { $loginLink = "https://localhost:9999/login?token=$token" }
              }
            }
            if (-not $loginLink) {
              throw "Could not determine login link"
            }
            Write-Host "Login link: $loginLink"
            "BBX_LOGIN_LINK=$loginLink" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            bbx run
            Write-Host "Testing URL: $loginLink"
            $uri = [System.Uri]$loginLink
            $port = $uri.Port
            $chromeDebuggerPort = $port - 3000
            $chromeProbeOk = $false
            $chromeProbeUrl = $null
            $chromeProbeHosts = @("127.0.0.1", "localhost", "[::1]")
            for ($i = 0; $i -lt 10; $i++) {
              foreach ($probeHost in $chromeProbeHosts) {
                $probeUrl = "http://$probeHost`:$chromeDebuggerPort/json/version"
                Write-Host "Chrome debugger probe $($i+1)/10 => $probeUrl"
                $chromeProbeBody = curl.exe -sS --max-time 5 "$probeUrl" 2>&1
                if ($LASTEXITCODE -eq 0 -and -not [string]::IsNullOrWhiteSpace($chromeProbeBody)) {
                  Write-Host "Chrome debugger probe succeeded:"
                  Write-Host $chromeProbeBody
                  $chromeProbeOk = $true
                  $chromeProbeUrl = $probeUrl
                  break
                }
                Write-Host "Chrome debugger probe failed: $chromeProbeBody"
              }
              if ($chromeProbeOk) { break }
              Start-Sleep -Seconds 5
            }
            $readyOk = $false
            for ($attempt = 1; $attempt -le 3; $attempt++) {
              Write-Host "Readiness attempt $attempt/3..."
              node .github/scripts/bbx-ci-e2e.mjs ready "$loginLink" --timeout-ms=60000 --interval-ms=5000
              if ($LASTEXITCODE -eq 0) { $readyOk = $true; break }
              Write-Host "Attempt $attempt failed, checking if BBX is still alive..."
              $bbxProcs = Get-Process -Name "browserbox*" -ErrorAction SilentlyContinue
              if (-not $bbxProcs) {
                Write-Host "BBX process not running — dumping logs:"
                $logDir = "$env:USERPROFILE\.config\dosaygo\bbpro"
                Get-ChildItem "$logDir\*.log" -ErrorAction SilentlyContinue | ForEach-Object {
                  Write-Host "=== $($_.Name) ==="
                  Get-Content $_.FullName -Tail 40 -ErrorAction SilentlyContinue
                }
                throw "BBX exited before readiness check succeeded (likely license validation failure)"
              }
              if ($chromeProbeOk) {
                Write-Warning "BrowserBox Chrome debugger probe succeeded at $chromeProbeUrl but BBX app readiness still failed. This points to internal readiness/priming rather than Chrome bring-up."
              }
              Start-Sleep -Seconds 5
            }
            if (-not $readyOk) { throw "Readiness check failed after 3 attempts" }
            $devtoolsPort = $port + 1
            $devtoolsLink = $loginLink.Replace(":$port", ":$devtoolsPort")
            Write-Host "Testing Devtools URL: $devtoolsLink"
            $devtoolsOk = $false
            for ($i = 0; $i -lt 10; $i++) {
              $response = curl.exe -k -L --max-time 10 "$devtoolsLink" -o NUL -w "%{http_code}" 2>$null
              if ($response -ne "000") { $devtoolsOk = $true; break }
              Write-Host "  Devtools probe $($i+1)/10 — retrying in 5s..."
              Start-Sleep -Seconds 5
            }
            if (-not $devtoolsOk) { throw "Devtools connection failed after 10 attempts" }
            Write-Host "Devtools connection successful: $response"
            Write-Host "Waiting 30 seconds to verify link stability..."
            Start-Sleep -Seconds 30
            node .github/scripts/bbx-ci-e2e.mjs ready "$loginLink" --timeout-ms=45000 --interval-ms=4000
            if ($LASTEXITCODE -ne 0) { throw "Second readiness check failed" }
            $response = curl.exe -k -L --max-time 10 "$devtoolsLink" -o NUL -w "%{http_code}" 2>$null
            if ($response -eq "000") { throw "Second devtools check failed: HTTP $response" }
            Write-Host "Second verification (Devtools) successful: $response"
          } finally {
            if ($wrtcWatcher) {
              Stop-Job -Job $wrtcWatcher -ErrorAction SilentlyContinue
              Receive-Job -Job $wrtcWatcher -ErrorAction SilentlyContinue | Out-Host
              Remove-Job -Job $wrtcWatcher -Force -ErrorAction SilentlyContinue
            }
          }

      - name: Cleanup (Windows)
        if: always() && matrix.os == 'windows-latest'
        shell: pwsh
        env:
          BBX_NO_UPDATE: "true"
        run: |
          bbx stop 2>$null
          $nodeProcs = Get-Process -Name "browserbox", "browserbox-devtools" -ErrorAction SilentlyContinue
          if ($nodeProcs) {
            Write-Warning "Node processes still running after stop: $($nodeProcs | Format-List Name, Id | Out-String)"
          } else {
            Write-Host "No Node processes remain -- cleanup successful."
          }

      - name: Print BBX Logs on Failure (Windows)
        if: failure() && matrix.os == 'windows-latest'
        id: print_logs_win
        shell: pwsh
        run: |
          $logDir = "$env:USERPROFILE\.config\dosaygo\bbpro\service_logs"
          $logsFound = $false
          $logs = @("bb-main-out.log", "bb-main-err.log")
          if (Test-Path $logDir) {
            foreach ($log in $logs) {
              $logPath = Join-Path $logDir $log
              if (Test-Path $logPath) {
                Write-Host "===== Contents of ${log} ====="
                Get-Content $logPath -Tail 200
                $logsFound = $true
              } else {
                Write-Host "$log not found at $logPath"
              }
            }
          } else {
            Write-Host "Log directory not found: $logDir"
            Write-Host "Checking config dir..."
            if (Test-Path "$env:USERPROFILE\.config\dosaygo\bbpro") {
              Get-ChildItem "$env:USERPROFILE\.config\dosaygo\bbpro" | Format-Table
            } else {
              Write-Host "Config dir not found"
            }
          }
          $oldLogDir = "$env:USERPROFILE\.config\dosaygo\bbpro\logs"
          if (Test-Path $oldLogDir) {
            Write-Host "===== Old logs directory found ====="
            Get-ChildItem $oldLogDir | ForEach-Object {
              Write-Host "--- $($_.Name) ---"
              Get-Content $_.FullName -Tail 100
            }
            $logsFound = $true
          }
          echo "logs_found=$logsFound" >> $env:GITHUB_OUTPUT

      - name: Debug with tmate (Windows, no logs found)
        if: failure() && matrix.os == 'windows-latest' && steps.print_logs_win.outputs.logs_found == 'False' && env.DISABLE_TMATE != 'true'
        uses: mxschmitt/action-tmate@v3.23
        timeout-minutes: 10
        with:
          limit-access-to-actor: true
        env:
          GH_TOKEN: ${{ env.WORKFLOW_GH_TOKEN }}
          BBX_NO_UPDATE: "true"
          BBX_FORCE_CHROME_INSTALL: "true"
          BBX_HOSTNAME: "localhost"
          EMAIL: "test@example.com"
          BB_QUICK_EXIT: "surewhatevs"
          LICENSE_KEY: ${{ secrets.BB_LICENSE_KEY }}
          BBX_TEST_AGREEMENT: "true"
          STATUS_MODE: ${{ secrets.STATUS_MODE_KEY }}
          BBX_DONT_KILL_CHROME_ON_STOP: "false"

      - name: Print BBX Logs on Failure (Unix/macOS)
        if: failure() && matrix.os != 'windows-latest'
        id: print_logs
        shell: bash
        run: |
          echo "===== Installer debug logs ====="
          shopt -s nullglob
          for log in /tmp/bbx-install-debug-*/*/*/install.log; do
            echo "===== ${log} (last 200 lines) ====="
            tail -200 "$log"
          done
          shopt -u nullglob
          INSTALL_USER="${BBX_INSTALL_USER:-bbxuser}"
          if id "$INSTALL_USER" &>/dev/null; then
            USER_HOME="$(getent passwd "$INSTALL_USER" | cut -d: -f6)"
          else
            USER_HOME="$HOME"
          fi
          LOG_DIR="${USER_HOME}/.config/dosaygo/bbpro/service_logs"
          echo "===== Checking $LOG_DIR (install user: $INSTALL_USER, home: $USER_HOME) ====="
          if [[ -d "$LOG_DIR" ]]; then
            mapfile -t log_files < <(find "$LOG_DIR" -type f | sort)
            if ((${#log_files[@]})); then
              for log in "${log_files[@]}"; do
                echo "===== ${log#"${LOG_DIR}/"} (last 200 lines) ====="
                tail -200 "$log"
              done
              echo "logs_found=true" >> "$GITHUB_OUTPUT"
            else
              echo "No files found under $LOG_DIR"
              find "$LOG_DIR" -maxdepth 2 -mindepth 1 -print | sort || true
              echo "logs_found=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "Log directory not found: $LOG_DIR"
            echo "Checking if config dir exists..."
            ls -la "${USER_HOME}/.config/dosaygo/bbpro/" 2>/dev/null || echo "Config dir not found at ${USER_HOME}/.config/dosaygo/bbpro/"
            echo "logs_found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Debug with tmate (no logs found)
        if: failure() && matrix.os != 'windows-latest' && steps.print_logs.outputs.logs_found == 'false' && env.DISABLE_TMATE != 'true'
        uses: mxschmitt/action-tmate@v3.23
        timeout-minutes: 10
        with:
          limit-access-to-actor: true
        env:
          BBX_INSTALL_USER: "bbxuser"
          BBX_HOSTNAME: "localhost"
          BBX_NO_UPDATE: "true"
          BB_QUICK_EXIT: "yesplease"
          EMAIL: "test@example.com"
          LICENSE_KEY: ${{ secrets.BB_LICENSE_KEY }}
          BBX_TEST_AGREEMENT: "true"
          STATUS_MODE: ${{ secrets.STATUS_MODE_KEY }}
          INSTALL_DOC_VIEWER: "false"
          GH_TOKEN: ${{ env.WORKFLOW_GH_TOKEN }}
          BBX_RELEASE_REPO: ${{ env.TARGET_RELEASE_REPO }}
          BBX_RELEASE_TAG: ${{ env.RELEASE_TAG }}

      - name: Cleanup (Unix/macOS)
        if: always() && matrix.os != 'windows-latest'
        shell: bash
        env:
          BBX_TEST_AGREEMENT: "true"
          BBX_NO_UPDATE: "true"
        run: |
          if command -v bbx &>/dev/null; then
            bbx stop || true
          elif command -v browserbox &>/dev/null; then
            browserbox pm2 stop bb-main || true
          fi
          pkill -f browserbox || true
